<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil Botões · Painel de Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f3f0;
    --panel:#ffffff;
    --ink:#1b1d1f;
    --ink-soft:#5b6066;
    --line:#e2e3de;
    --brass:#b4842a;
    --brass-soft:#f4e7d1;
    --teal:#3c6b62;
    --teal-soft:#e2ede9;
    --rust:#ad4a3a;
    --rust-soft:#f4dfd9;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---- header ---- */
  header{
    background:var(--ink);
    color:#f2f3f0;
    padding:22px 20px 26px;
  }
  .header-inner{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{height:38px;width:auto;flex-shrink:0;display:block;}
  .brand h1{font-size:1.35rem;letter-spacing:.2px;}
  .brand p{margin:2px 0 0;font-size:.8rem;color:#b7bcc2;font-family:'IBM Plex Mono',monospace;}
  .updated{
    font-size:.78rem;
    color:#cfd3d8;
    background:#2a2d31;
    padding:7px 12px;
    border-radius:999px;
    font-family:'IBM Plex Mono',monospace;
  }
  .updated b{color:#e6c98a;font-weight:600;}

  /* ---- filters ---- */
  .filters{
    max-width:1180px;
    margin:-20px auto 0;
    padding:0 20px;
  }
  .filters-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    box-shadow:0 8px 24px -16px rgba(0,0,0,.25);
  }
  @media (max-width:720px){
    .filters-panel{grid-template-columns:1fr;}
  }
  .field label{
    display:block;
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:600;
  }
  select{
    width:100%;
    padding:9px 10px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fbfbfa;
    font-size:.92rem;
    font-family:'Inter',sans-serif;
    color:var(--ink);
  }

  /* ---- sections ---- */
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 0;}
  .section-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin:34px 0 14px;
  }
  .section-head h2{font-size:1.05rem;letter-spacing:.08em;}
  .section-head .tag{
    font-size:.7rem;
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink-soft);
  }
  .section-head::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  @media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:560px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 16px 14px;
    cursor:pointer;
    transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease;
    position:relative;
  }
  .card:hover{box-shadow:0 10px 22px -14px rgba(0,0,0,.3);transform:translateY(-1px);}
  .card.active{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass-soft);}
  .card .label{
    font-size:.74rem;
    color:var(--ink-soft);
    font-weight:600;
    letter-spacing:.02em;
    line-height:1.3;
    min-height:2.4em;
  }
  .card .value{
    font-family:'IBM Plex Mono',monospace;
    font-size:1.7rem;
    font-weight:600;
    margin-top:6px;
  }
  .card .value.rust{color:var(--rust);}
  .card .value.teal{color:var(--teal);}
  .card .value.brass{color:var(--brass);}
  .card .btn-icon{position:absolute;top:14px;right:14px;opacity:.35;}

  /* ---- detail panel ---- */
  .detail{
    display:none;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-top:12px;
    padding:14px 16px 18px;
  }
  .detail.open{display:block;}
  .detail-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .detail-head h3{font-size:.95rem;}
  .detail-head .count{font-size:.78rem;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .detail-search{
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:.85rem;
    width:220px;
    max-width:100%;
  }
  .table-scroll{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;font-size:.82rem;}
  th,td{
    text-align:left;
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  th{
    font-size:.68rem;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--ink-soft);
    position:sticky;top:0;background:var(--panel);
  }
  tr:hover td{background:#fafaf8;}
  .pill{
    display:inline-block;
    font-size:.7rem;
    font-weight:600;
    padding:2px 8px;
    border-radius:999px;
  }
  .pill.ok{background:var(--teal-soft);color:var(--teal);}
  .pill.late{background:var(--rust-soft);color:var(--rust);}
  .pill.neutral{background:#eee;color:var(--ink-soft);}
  .close-detail{
    border:none;background:none;color:var(--ink-soft);
    font-size:.78rem;cursor:pointer;text-decoration:underline;
  }
  .empty-msg{color:var(--ink-soft);font-size:.85rem;padding:20px 0;text-align:center;}

  footer{
    max-width:1180px;margin:40px auto 0;padding:14px 20px;
    color:var(--ink-soft);font-size:.75rem;font-family:'IBM Plex Mono',monospace;
    border-top:1px solid var(--line);
  }
</style>
</head>

      row:(r)=> r['Situação do pedido']==='Faturado Total',
      monthField:'Data Emissão Pedido'},
    {id:'v_valor_fat', label:'VALOR FATURADO (R$)', agg:'sum', field:'Valor Nota Fiscal', cls:'brass',
      row:(r)=> r['Situação do pedido']==='Faturado Total',
      monthField:'Data Emissão Pedido'},
    {id:'v_entregue_prazo', label:'PEDIDOS ENTREGUES NA DATA', agg:'count', cls:'teal',
      row:(r)=> r['Data Faturamento'] && r['Data Previsão Faturamento'] && r['Data Faturamento']<=r['Data Previsão Faturamento'],
      monthField:'Data Emissão Pedido'},
    {id:'v_entregue_atraso', label:'PEDIDOS ENTREGUES EM ATRASO', agg:'count', cls:'rust',
      row:(r)=> r['Data Faturamento'] && r['Data Previsão Faturamento'] && r['Data Faturamento']>r['Data Previsão Faturamento'],
      monthField:'Data Emissão Pedido'},
  ],
  amostras: [
    {id:'a_prod_prazo', label:'PEDIDOS EM PRODUÇÃO NO PRAZO', agg:'count', cls:'brass',
      row:(r,t)=> r['Situação do pedido']!=='Faturado Total' && r['Data Previsão Faturamento'] && r['Data Previsão Faturamento']>=t,
      monthField:'Data Emissão Pedido'},
    {id:'a_prod_atraso', label:'PEDIDOS EM PRODUÇÃO EM ATRASO', agg:'count', cls:'rust',
      row:(r,t)=> r['Situação do pedido']!=='Faturado Total' && r['Data Previsão Faturamento'] && r['Data Previsão Faturamento']<t,
      monthField:'Data Emissão Pedido'},
    {id:'a_qtde_fat', label:'QTDE. PEDIDOS FATURADOS', agg:'count', cls:'teal',
      row:(r)=> r['Situação do pedido']==='Faturado Total',
      monthField:'Data Faturamento'},
    {id:'a_valor_fat', label:'VALOR FATURADO (R$)', agg:'sum', field:'Valor Nota Fiscal', cls:'brass',
      row:(r)=> r['Situação do pedido']==='Faturado Total',
      monthField:'Data Faturamento'},
    {id:'a_entregue_prazo', label:'PEDIDOS ENTREGUES NA DATA', agg:'count', cls:'teal',
      row:(r)=> r['Data Faturamento'] && r['Data Previsão Faturamento'] && r['Data Faturamento']<=r['Data Previsão Faturamento'],
      monthField:'Data Faturamento'},
    {id:'a_entregue_atraso', label:'PEDIDOS ENTREGUES EM ATRASO', agg:'count', cls:'rust',
      row:(r)=> r['Data Faturamento'] && r['Data Previsão Faturamento'] && r['Data Faturamento']>r['Data Previsão Faturamento'],
      monthField:'Data Faturamento'},
  ]
};

function passesGlobalFilters(r, monthField){
  if(filters.rep!=='Todos' && r['Representante']!==filters.rep) return false;
  if(filters.cli!=='Todos' && r['Cliente']!==filters.cli) return false;
  if(filters.mes!=='Todos'){
    const k = ymKey(r[monthField]);
    if(k!==filters.mes) return false;
  }
  return true;
}

function computeSubset(dataset, kpi){
  const t = todayStr();
  return dataset.filter(r => passesGlobalFilters(r, kpi.monthField) && kpi.row(r,t));
}

function computeValue(subset, kpi){
  if(kpi.agg==='count') return subset.length;
  return subset.reduce((s,r)=> s + (Number(r[kpi.field])||0), 0);
}

let activeCard = {vendas:null, amostras:null};

function renderCards(section){
  const dataset = DATA[section];
  const grid = document.getElementById(section==='vendas'?'gridVendas':'gridAmostras');
  grid.innerHTML = '';
  KPI_DEFS[section].forEach(kpi=>{
    const subset = computeSubset(dataset, kpi);
    const value = computeValue(subset, kpi);
    const div = document.createElement('div');
    div.className = 'card' + (activeCard[section]===kpi.id ? ' active':'');
    div.innerHTML = `
      <div class="btn-icon"><svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" stroke="#b4842a" stroke-width="1.4" fill="none"/></svg></div>
      <div class="label">${kpi.label}</div>
      <div class="value ${kpi.cls}">${kpi.agg==='sum' ? fmtMoney(value) : fmtInt(value)}</div>
    `;
    div.onclick = ()=> toggleDetail(section, kpi, subset);
    grid.appendChild(div);
  });
  document.getElementById(section==='vendas'?'vendasCount':'amostrasCount').textContent =
    `${dataset.length.toLocaleString('pt-BR')} pedidos na base`;
}

function toggleDetail(section, kpi, subset){
  const panel = document.getElementById(section==='vendas'?'detailVendas':'detailAmostras');
  if(activeCard[section]===kpi.id){
    activeCard[section]=null;
    panel.classList.remove('open');
    renderCards(section);
    return;
  }
  activeCard[section]=kpi.id;
  renderCards(section);
  panel.classList.add('open');
  document.getElementById(section==='vendas'?'detailVendasTitle':'detailAmostrasTitle').textContent = kpi.label;
  document.getElementById(section==='vendas'?'detailVendasCount':'detailAmostrasCount').textContent =
    `${subset.length} registro(s)`;
  renderTable(section, subset);
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDetail(section){
  activeCard[section]=null;
  document.getElementById(section==='vendas'?'detailVendas':'detailAmostras').classList.remove('open');
  renderCards(section);
}

const COLS = ['Situação do pedido','Cliente','Representante','Pedido Consistem','Data Emissão Pedido','Data Previsão Faturamento','Data Faturamento','Valor Nota Fiscal','Valor Saldo Pedido'];

function renderTable(section, subset){
  const table = document.getElementById(section==='vendas'?'tableVendas':'tableAmostras');
  const today = todayStr();
  const draw = (rows)=>{
    if(rows.length===0){
      table.innerHTML = `<tr><td class="empty-msg">Nenhum registro encontrado.</td></tr>`;
      return;
    }
    let html = '<thead><tr>' + COLS.map(c=>`<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    rows.slice(0,500).forEach(r=>{
      html += '<tr>';
      COLS.forEach(c=>{
        let v = r[c];
        if(c==='Situação do pedido'){
          let cls = v==='Faturado Total' ? 'ok' : 'neutral';
          if(v!=='Faturado Total' && r['Data Previsão Faturamento'] && r['Data Previsão Faturamento']<today) cls='late';
          html += `<td><span class="pill ${cls}">${v}</span></td>`;
        } else if(c.startsWith('Data')){
          html += `<td>${fmtDate(v)}</td>`;
        } else if(c==='Valor Nota Fiscal' || c==='Valor Saldo Pedido'){
          html += `<td class="mono">${fmtMoney(v)}</td>`;
        } else {
          html += `<td>${v ?? ''}</td>`;
        }
      });
      html += '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
  };
  draw(subset);

  const searchInput = document.getElementById(section==='vendas'?'searchVendas':'searchAmostras');
  searchInput.value='';
  searchInput.oninput = ()=>{
    const q = searchInput.value.trim().toLowerCase();
    if(!q){ draw(subset); return; }
    draw(subset.filter(r =>
      (r['Cliente']||'').toLowerCase().includes(q) ||
      String(r['Pedido Consistem']||'').toLowerCase().includes(q) ||
      (r['Representante']||'').toLowerCase().includes(q)
    ));
  };
}

let TODOS_OS_DADOS = [];

function clientesDoRepresentante(rep){
  const clis = new Set();
  TODOS_OS_DADOS.forEach(r=>{
    if(!r['Cliente']) return;
    if(rep==='Todos' || r['Representante']===rep) clis.add(r['Cliente']);
  });
  return [...clis].sort();
}

function populateFilters(){
  TODOS_OS_DADOS = [...DATA.vendas, ...DATA.amostras];
  const meses = new Set(), reps = new Set();
  TODOS_OS_DADOS.forEach(r=>{
    if(r['Data Emissão Pedido']) meses.add(ymKey(r['Data Emissão Pedido']));
    if(r['Data Faturamento']) meses.add(ymKey(r['Data Faturamento']));
    if(r['Representante']) reps.add(r['Representante']);
  });
  const mesesArr = [...meses].sort();
  fillSelect('fMes', ['Todos', ...mesesArr], (k)=> k==='Todos' ? 'Todos' : ymLabel(k));
  fillSelect('fRep', ['Todos', ...[...reps].sort()]);
  fillSelect('fCli', ['Todos', ...clientesDoRepresentante('Todos')]);

  document.getElementById('fRep').onchange = ()=>{
    filters.rep = document.getElementById('fRep').value;
    // Atualiza a lista de clientes para mostrar só os desse representante
    filters.cli = 'Todos';
    fillSelect('fCli', ['Todos', ...clientesDoRepresentante(filters.rep)]);
    aplicarFiltrosEAtualizar();
  };
}

function aplicarFiltrosEAtualizar(){
  activeCard.vendas=null; activeCard.amostras=null;
  document.getElementById('detailVendas').classList.remove('open');
  document.getElementById('detailAmostras').classList.remove('open');
  renderCards('vendas');
  renderCards('amostras');
}

function fillSelect(id, values, labelFn){
  const sel = document.getElementById(id);
  sel.innerHTML = values.map(v=>`<option value="${v}">${labelFn?labelFn(v):v}</option>`).join('');
  if(id==='fRep') return; // fRep tem handler próprio, definido em populateFilters
  sel.onchange = ()=>{
    const key = id==='fMes'?'mes':'cli';
    filters[key]=sel.value;
    aplicarFiltrosEAtualizar();
  };
}

fetch('data.json?_=' + Date.now())
  .then(r=>r.json())
  .then(json=>{
    DATA.vendas = json.vendas || [];
    DATA.amostras = json.amostras || [];
    document.getElementById('updatedAt').textContent = json.gerado_em || '—';
    populateFilters();
    renderCards('vendas');
    renderCards('amostras');
  })
  .catch(err=>{
    document.querySelector('.wrap').innerHTML =
      '<p style="padding:40px 0;color:#ad4a3a;">Não foi possível carregar data.json. Verifique se o arquivo está na mesma pasta do index.html.</p>';
    console.error(err);
  });
</script>
